name = "tipsheet"
main = "worker-entry.js"
compatibility_date = "2026-05-01"
workers_dev = true
assets = { directory = "./dist", binding = "ASSETS", run_worker_first = true }

[vars]
SITE_URL = "https://tipsheet.markets"
GITHUB_REPOSITORY = "bebhuvan/tipsheet"
WATCHDOG_WORKFLOW = "pipeline.yml"
BRIEFINGS_WORKFLOW = "briefings.yml"
WATCHDOG_BRANCH = "main"
WATCHDOG_MAX_STALE_MIN = "45"
BRIEFING_OPEN_GRACE_MIN = "5"
BRIEFING_CLOSE_GRACE_MIN = "5"

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "tipsheet_db"
database_name = "tipsheet-db"
database_id = "4645967f-e1aa-4291-b023-5509fcddb758"

[[routes]]
pattern = "tipsheet.markets"
custom_domain = true
