name: RBI + Regulatory

# Ingest-only: exchange circulars (NSE/BSE/SEBI) + RBI RSS/bulletins, enrich,
# publish the DB. publish-site.yml deploys automatically on success.

on:
  schedule:
    # Regulatory notices before market, after close, evening, and late catch.
    # Minutes are de-clustered from Concalls (:52) and Macro (:42) so writers
    # don't collide on the shared DB write-lock (which drops queued runs).
    - cron: '32 2 * * 1-5'
    - cron: '47 10,13,16 * * 1-5'
    # Weekend public-source sweep.
    - cron: '22 5,11 * * 6,0'
  workflow_dispatch:
    inputs:
      include_bulletin:
        description: 'Also ingest RBI Bulletin PDFs'
        type: boolean
        default: true

env:
  NODE_VERSION: '22'

permissions:
  contents: write

concurrency:
  group: tipsheet-db-write
  cancel-in-progress: false

jobs:
  rbi-regulatory:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Restore latest DB
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Install pipeline deps
        run: cd pipeline && npm ci

      - name: Poll exchange circulars (NSE/BSE/SEBI)
        run: cd pipeline && node circulars_poller.mjs
        continue-on-error: true

      - name: Poll RBI RSS
        run: cd pipeline && node rbi_poller.mjs
        continue-on-error: true

      - name: Setup Python (PDF extract)
        if: ${{ github.event_name == 'schedule' && (github.event.schedule == '32 2 * * 1-5' || github.event.schedule == '22 5,11 * * 6,0') || github.event_name == 'workflow_dispatch' && inputs.include_bulletin }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Ingest RBI Bulletin articles
        if: ${{ github.event_name == 'schedule' && (github.event.schedule == '32 2 * * 1-5' || github.event.schedule == '22 5,11 * * 6,0') || github.event_name == 'workflow_dispatch' && inputs.include_bulletin }}
        run: |
          pip install --quiet pdfplumber
          cd pipeline && python3 pdf_extract.py bulletin --limit 4
        continue-on-error: true

      - name: Enrich + persist circulars
        run: cd pipeline && node --env-file=../.env.ci circulars_enricher.mjs run 30
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        continue-on-error: true

      - name: Enrich + persist RBI
        run: cd pipeline && node --env-file=../.env.ci rbi_enricher.mjs run 30
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        continue-on-error: true

      - name: Show stats
        run: cd pipeline && node --env-file=../.env.ci run.mjs stats

      - name: Sync content tables to D1
        if: always()
        run: bash .github/scripts/sync-d1.sh
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: '4645967f-e1aa-4291-b023-5509fcddb758'
        continue-on-error: true

      - name: Publish latest DB
        if: always()
        run: bash .github/scripts/publish-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          context: RBI + Regulatory ingest
