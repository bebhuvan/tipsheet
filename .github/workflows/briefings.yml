name: Market Briefings

# Ingest-only: generate The Open / The Close briefings and publish the DB.
# publish-site.yml deploys automatically on success.

on:
  schedule:
    # The Open: 08:00 IST weekdays.
    - cron: '30 2 * * 1-5'
    # The Close: 16:00 IST weekdays.
    - cron: '30 10 * * 1-5'
  workflow_dispatch:
    inputs:
      briefing:
        description: 'Briefing to generate'
        type: choice
        options:
          - all
          - open
          - close
        default: all
      date:
        description: 'Briefing date in IST, YYYY-MM-DD. Leave blank for today.'
        type: string
        default: ''

env:
  NODE_VERSION: '22'

permissions:
  contents: write

concurrency:
  group: tipsheet-db-write
  cancel-in-progress: false

jobs:
  briefings:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Restore latest DB
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Install pipeline deps
        run: cd pipeline && npm ci

      - name: Fetch fundamentals
        run: cd pipeline && node --env-file=../.env.ci run.mjs fetch-fundamentals
        env:
          KITE_SCREENER_URL: ${{ secrets.KITE_SCREENER_URL }}
        continue-on-error: true

      - name: Setup Python (market data)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch market data (yfinance)
        run: |
          pip install --quiet yfinance
          cd pipeline && python3 market_yf.py --hours 36
        continue-on-error: true

      - name: Generate The Open briefing
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.briefing == 'all' || inputs.briefing == 'open') || github.event.schedule == '30 2 * * 1-5' }}
        run: cd pipeline && node --env-file=../.env.ci run.mjs briefing-open "$BRIEFING_DATE"
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: mimo-v2.5-pro
          LLM_TIMEOUT_MS_BRIEFING: 90000
          BRIEFING_FALLBACK_LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BRIEFING_FALLBACK_LLM_BASE_URL: https://api.deepseek.com
          BRIEFING_FALLBACK_LLM_MODEL: deepseek-v4-flash
          BRIEFING_FALLBACK_LLM_TIMEOUT_MS: 90000
          BRIEFING_DATE: ${{ github.event.inputs.date || '' }}

      - name: Generate The Close briefing
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.briefing == 'all' || inputs.briefing == 'close') || github.event.schedule == '30 10 * * 1-5' }}
        run: cd pipeline && node --env-file=../.env.ci run.mjs briefing-close "$BRIEFING_DATE"
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: mimo-v2.5-pro
          LLM_TIMEOUT_MS_BRIEFING: 90000
          BRIEFING_FALLBACK_LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BRIEFING_FALLBACK_LLM_BASE_URL: https://api.deepseek.com
          BRIEFING_FALLBACK_LLM_MODEL: deepseek-v4-flash
          BRIEFING_FALLBACK_LLM_TIMEOUT_MS: 90000
          BRIEFING_DATE: ${{ github.event.inputs.date || '' }}

      - name: Show stats
        run: cd pipeline && node --env-file=../.env.ci run.mjs stats

      - name: Sync content tables to D1
        if: always()
        timeout-minutes: 3
        run: bash .github/scripts/sync-d1.sh
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: '4645967f-e1aa-4291-b023-5509fcddb758'
          D1_SYNC_ARGS: '--tables source_health'
        continue-on-error: true

      - name: Publish latest DB
        if: always()
        run: bash .github/scripts/publish-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          context: Market Briefings ingest
