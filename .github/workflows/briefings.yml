name: Market Briefings + Deploy

on:
  schedule:
    # The Open: 08:45 IST weekdays.
    - cron: '15 3 * * 1-5'
    # The Close: 17:00 IST weekdays.
    - cron: '30 11 * * 1-5'
  workflow_dispatch:
    inputs:
      briefing:
        description: 'Briefing to generate'
        type: choice
        options:
          - all
          - open
          - close
        default: all
      skip_deploy:
        description: 'Skip Cloudflare Workers deploy'
        type: boolean
        default: false

env:
  NODE_VERSION: '22'

concurrency:
  group: tipsheet-db-${{ github.ref }}
  cancel-in-progress: false

jobs:
  briefings:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore DB cache
        uses: actions/cache/restore@v4
        id: db-cache
        with:
          path: data/filings.db
          key: filings-db-${{ github.run_id }}
          restore-keys: |
            filings-db-

      - name: Download seed DB from release
        if: steps.db-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          gh release download --pattern 'filings.db.gz' -R "$REPO" || true
          if [ -f filings.db.gz ]; then gunzip -f filings.db.gz && mv -f filings.db data/filings.db; fi
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Install pipeline deps
        run: cd pipeline && npm ci

      - name: Fetch fundamentals
        run: cd pipeline && node --env-file=../.env.ci run.mjs fetch-fundamentals
        env:
          KITE_SCREENER_URL: ${{ secrets.KITE_SCREENER_URL }}
        continue-on-error: true

      - name: Setup Python (market data)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch market data (yfinance)
        run: |
          pip install --quiet yfinance
          cd pipeline && python3 market_yf.py --hours 36
        continue-on-error: true

      - name: Generate The Open briefing
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.briefing == 'all' || inputs.briefing == 'open') || github.event.schedule == '15 3 * * 1-5' }}
        run: cd pipeline && node --env-file=../.env.ci run.mjs briefing-open
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

      - name: Generate The Close briefing
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.briefing == 'all' || inputs.briefing == 'close') || github.event.schedule == '30 11 * * 1-5' }}
        run: cd pipeline && node --env-file=../.env.ci run.mjs briefing-close
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

      - name: Show stats
        run: cd pipeline && node --env-file=../.env.ci run.mjs stats

      - name: Save DB cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/filings.db
          key: filings-db-${{ github.run_id }}

      - name: Restore + persist OG image cache
        if: ${{ !inputs.skip_deploy }}
        uses: actions/cache@v4
        with:
          path: site/.og-cache
          key: og-cache-${{ github.run_id }}
          restore-keys: |
            og-cache-

      - name: Install site deps
        if: ${{ !inputs.skip_deploy }}
        run: cd site && npm ci

      - name: Build site
        if: ${{ !inputs.skip_deploy }}
        run: cd site && npm run build

      - name: Deploy to Cloudflare Workers
        if: ${{ !inputs.skip_deploy }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: deploy

      - name: Notify Telegram
        if: ${{ !inputs.skip_deploy }}
        run: cd pipeline && node --env-file=../.env.ci notify_telegram.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SCOPE: briefings
          SITE_URL: https://tipsheet.markets

      - name: Save post-notification DB cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/filings.db
          key: filings-db-${{ github.run_id }}-post-notify
