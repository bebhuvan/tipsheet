name: Concalls + Deploy

on:
  schedule:
    # Post-market transcript sweep: 16:22, 17:22, 18:22 IST weekdays.
    - cron: '52 10,11,12 * * 1-5'
    # Late catch: 22:22 IST weekdays.
    - cron: '52 16 * * 1-5'
    # Weekend transcript coverage.
    - cron: '37 4,9,14 * * 6,0'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max Tijori concalls to poll/enrich'
        type: string
        default: '50'
      skip_deploy:
        description: 'Skip Cloudflare Workers deploy'
        type: boolean
        default: false

env:
  NODE_VERSION: '22'

permissions:
  contents: write

concurrency:
  group: tipsheet-db-${{ github.ref }}
  cancel-in-progress: false

jobs:
  concalls:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore latest DB
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Install pipeline deps
        run: cd pipeline && npm ci

      - name: Fetch fundamentals
        run: cd pipeline && node --env-file=../.env.ci run.mjs fetch-fundamentals
        env:
          KITE_SCREENER_URL: ${{ secrets.KITE_SCREENER_URL }}
        continue-on-error: true

      - name: Poll + enrich Tijori concalls
        run: cd pipeline && node --env-file=../.env.ci run.mjs concalls "$LIMIT"
        env:
          TIJORI_CONCALLS_API_KEY: ${{ secrets.TIJORI_CONCALLS_API_KEY }}
          TIJORI_CONCALLS_BASE_URL: ${{ secrets.TIJORI_CONCALLS_BASE_URL }}
          LIMIT: ${{ inputs.limit || '50' }}
        continue-on-error: true

      - name: Concall notes from AlphaStreet
        run: cd pipeline && node --env-file=../.env.ci alphastreet.mjs run 12
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        continue-on-error: true

      - name: Show stats
        run: cd pipeline && node --env-file=../.env.ci run.mjs stats

      - name: Publish latest DB
        if: always()
        run: bash .github/scripts/publish-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Restore + persist OG image cache
        if: ${{ !inputs.skip_deploy }}
        uses: actions/cache@v4
        with:
          path: site/.og-cache
          key: og-cache-${{ github.run_id }}
          restore-keys: |
            og-cache-

      - name: Install site deps
        if: ${{ !inputs.skip_deploy }}
        run: cd site && npm ci

      - name: Build site
        if: ${{ !inputs.skip_deploy }}
        run: cd site && npm run build

      - name: Deploy to Cloudflare Workers
        if: ${{ !inputs.skip_deploy }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: deploy
