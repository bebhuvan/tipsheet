name: Tijori SDK

# Ingest-only: daily Tijori SDK ingest — fundamentals, slugs, market signals,
# and financial widgets (synced to D1). Publishes the DB. publish-site.yml
# deploys automatically on success.

on:
  schedule:
    # Daily SDK ingest: 06:47 IST, before market open and away from top-of-hour load.
    - cron: '17 1 * * *'
  workflow_dispatch:
    inputs:
      slug_limit:
        description: 'Max missing Tijori slugs to resolve'
        type: string
        default: '75'

env:
  NODE_VERSION: '22'

permissions:
  contents: write

concurrency:
  group: tipsheet-db-write
  cancel-in-progress: false

jobs:
  tijori-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Restore latest DB
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Install pipeline deps
        run: cd pipeline && npm ci

      - name: Fetch fundamentals
        run: cd pipeline && node --env-file=../.env.ci run.mjs fetch-fundamentals
        env:
          KITE_SCREENER_URL: ${{ secrets.KITE_SCREENER_URL }}
        continue-on-error: true

      - name: Resolve Tijori slugs
        run: cd pipeline && node --env-file=../.env.ci run.mjs resolve-tijori-slugs "$LIMIT"
        env:
          LIMIT: ${{ inputs.slug_limit || '75' }}
        continue-on-error: true

      - name: Restore + persist Tijori widget cache
        uses: actions/cache@v4
        with:
          path: data/tijori-cache
          key: tijori-cache-${{ github.run_id }}
          restore-keys: |
            tijori-cache-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Tijori SDK
        run: pip install "git+https://x-access-token:${TIJORI_SDK_TOKEN}@github.com/bebhuvan/tijori-codex.git"
        env:
          TIJORI_SDK_TOKEN: ${{ secrets.TIJORI_SDK_TOKEN }}

      - name: Refresh Tijori market signals
        run: |
          tijori-scraper market-ingest --data-dir data/tijori-market
          python pipeline/market_signals.py --data-dir data/tijori-market --db data/filings.db
        env:
          TIJORI_COOKIE: ${{ secrets.TIJORI_COOKIE }}
        continue-on-error: true

      - name: Refresh Tijori financial widgets to D1
        run: |
          python pipeline/tijori_widgets.py --db data/filings.db --data-dir data/tijori-cache
          node pipeline/sync-widgets-to-d1.mjs
        env:
          TIJORI_COOKIE: ${{ secrets.TIJORI_COOKIE }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      # Replicate content tables (+ source_health) into D1 for the runtime
      # watchdog and staged Phase 4 SSR. Runs BEFORE publish so the incremental
      # watermark (_d1_sync_state) is persisted with the DB. Non-critical:
      # D1 is a replica, SQLite remains the source of truth.
      - name: Sync content tables to D1
        run: cd pipeline && node --env-file=../.env.ci sync-to-d1.mjs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: '4645967f-e1aa-4291-b023-5509fcddb758'
        continue-on-error: true

      - name: Show stats
        run: cd pipeline && node --env-file=../.env.ci run.mjs stats

      - name: Publish latest DB
        if: always()
        run: bash .github/scripts/publish-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          context: Tijori SDK ingest
