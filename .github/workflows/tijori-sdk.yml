name: Tijori SDK + Deploy

on:
  schedule:
    # Daily SDK ingest: 06:47 IST, before market open and away from top-of-hour load.
    - cron: '17 1 * * *'
  workflow_dispatch:
    inputs:
      slug_limit:
        description: 'Max missing Tijori slugs to resolve'
        type: string
        default: '75'
      skip_deploy:
        description: 'Skip Cloudflare Workers deploy'
        type: boolean
        default: false

env:
  NODE_VERSION: '22'

permissions:
  contents: write

concurrency:
  group: tipsheet-db-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tijori-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore latest DB
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Install pipeline deps
        run: cd pipeline && npm ci

      - name: Fetch fundamentals
        run: cd pipeline && node --env-file=../.env.ci run.mjs fetch-fundamentals
        env:
          KITE_SCREENER_URL: ${{ secrets.KITE_SCREENER_URL }}
        continue-on-error: true

      - name: Resolve Tijori slugs
        run: cd pipeline && node --env-file=../.env.ci run.mjs resolve-tijori-slugs "$LIMIT"
        env:
          LIMIT: ${{ inputs.slug_limit || '75' }}
        continue-on-error: true

      - name: Restore + persist Tijori widget cache
        uses: actions/cache@v4
        with:
          path: data/tijori-cache
          key: tijori-cache-${{ github.run_id }}
          restore-keys: |
            tijori-cache-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Tijori SDK
        run: pip install "git+https://x-access-token:${TIJORI_SDK_TOKEN}@github.com/bebhuvan/tijori-codex.git"
        env:
          TIJORI_SDK_TOKEN: ${{ secrets.TIJORI_SDK_TOKEN }}

      - name: Refresh Tijori market signals
        run: |
          tijori-scraper market-ingest --data-dir data/tijori-market
          python pipeline/market_signals.py --data-dir data/tijori-market --db data/filings.db
        env:
          TIJORI_COOKIE: ${{ secrets.TIJORI_COOKIE }}
        continue-on-error: true

      - name: Refresh Tijori financial widgets to D1
        run: |
          python pipeline/tijori_widgets.py --db data/filings.db --data-dir data/tijori-cache
          node pipeline/sync-widgets-to-d1.mjs
        env:
          TIJORI_COOKIE: ${{ secrets.TIJORI_COOKIE }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      - name: Show stats
        run: cd pipeline && node --env-file=../.env.ci run.mjs stats

      - name: Publish latest DB
        if: always()
        run: bash .github/scripts/publish-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Restore + persist OG image cache
        if: ${{ !inputs.skip_deploy }}
        uses: actions/cache@v4
        with:
          path: site/.og-cache
          key: og-cache-${{ github.run_id }}
          restore-keys: |
            og-cache-

      - name: Install site deps
        if: ${{ !inputs.skip_deploy }}
        run: cd site && npm ci

      - name: Build site
        if: ${{ !inputs.skip_deploy }}
        run: cd site && npm run build

      - name: Check internal links
        if: ${{ !inputs.skip_deploy }}
        run: cd site && npm run check:links

      - name: Deploy to Cloudflare Workers
        if: ${{ !inputs.skip_deploy }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: deploy
