name: Fast News + Deploy

on:
  schedule:
    # Pre-open catch: 07:20 IST weekdays, ahead of The Open digest.
    - cron: '50 1 * * 1-5'
    # Market hours: every ~30 min, 09:15-15:37 IST = UTC 03:45-10:07, weekdays.
    - cron: '45 3 * * 1-5'
    - cron: '15,45 4,5,6,7,8,9 * * 1-5'
    - cron: '7 10 * * 1-5'
    # Post-market catch: 16:07-17:07 IST = UTC 10:37-11:37.
    - cron: '37 10 * * 1-5'
    - cron: '7,37 11 * * 1-5'
    # Late-night catch: 22:00 IST weekdays.
    - cron: '30 16 * * 1-5'
    # Weekend coverage: every ~2h, 08:47-20:47 IST.
    - cron: '17 3,5,7,9,11,13,15 * * 6,0'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip Cloudflare Workers deploy'
        type: boolean
        default: false
      skip_pipeline:
        description: 'Skip pipeline (rebuild site only)'
        type: boolean
        default: false
      enrich_limit:
        description: 'Max filings to enrich'
        type: string
        default: '50'

env:
  NODE_VERSION: '22'

permissions:
  contents: write

concurrency:
  group: tipsheet-db-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: ${{ !inputs.skip_pipeline }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore latest DB
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Ensure data directory
        run: mkdir -p data

      - name: Install pipeline deps
        run: cd pipeline && npm ci

      - name: Fetch fundamentals
        run: cd pipeline && node --env-file=../.env.ci run.mjs fetch-fundamentals
        env:
          KITE_SCREENER_URL: ${{ secrets.KITE_SCREENER_URL }}
        continue-on-error: true

      - name: Poll filings
        run: cd pipeline && node --env-file=../.env.ci run.mjs poll
        env:
          TIJORI_FEED_URL: ${{ secrets.TIJORI_FEED_URL }}

      - name: Enrich filings
        run: cd pipeline && node --env-file=../.env.ci run.mjs enrich "$LIMIT"
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LIMIT: ${{ inputs.enrich_limit || '50' }}

      - name: Show stats
        run: cd pipeline && node --env-file=../.env.ci run.mjs stats

      - name: Upload DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: filings-db
          path: data/filings.db
          retention-days: 7

      - name: Publish latest DB
        if: always()
        run: bash .github/scripts/publish-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

  build-deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ always() && !inputs.skip_deploy && (needs.pipeline.result == 'success' || inputs.skip_pipeline) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download DB artifact
        if: ${{ !inputs.skip_pipeline }}
        uses: actions/download-artifact@v4
        with:
          name: filings-db
          path: data/

      - name: Restore latest DB
        if: ${{ inputs.skip_pipeline }}
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Restore + persist OG image cache
        uses: actions/cache@v4
        with:
          path: site/.og-cache
          key: og-cache-${{ github.run_id }}
          restore-keys: |
            og-cache-

      - name: Install site deps
        run: cd site && npm ci

      - name: Build site
        run: cd site && npm run build

      - name: Check internal links
        run: cd site && npm run check:links

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: deploy

      - name: Install pipeline deps for Telegram notifier
        if: success() && !inputs.skip_pipeline
        run: cd pipeline && npm ci

      - name: Notify Telegram
        if: success() && !inputs.skip_pipeline
        run: cd pipeline && node --env-file=../.env.ci notify_telegram.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SCOPE: all
          SITE_URL: https://tipsheet.markets

      - name: Publish post-notification DB
        if: always() && !inputs.skip_pipeline
        run: bash .github/scripts/publish-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
