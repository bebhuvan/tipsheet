name: Fast News

# Ingest-only: poll + enrich filings and publish the canonical DB, then finish.
# Building + deploying the site is handled by publish-site.yml, which runs
# automatically when this workflow succeeds. Keeping the slow build OUT of this
# job means the shared DB write-lock is held only for the short ingest window,
# so scheduled polls stop queuing behind multi-minute builds.

on:
  schedule:
    # Pre-open catch: 07:20 IST weekdays, ahead of The Open digest.
    - cron: '50 1 * * 1-5'
    # Market hours: every ~30 min, 09:15-15:37 IST = UTC 03:45-10:07, weekdays.
    - cron: '45 3 * * 1-5'
    - cron: '15,45 4,5,6,7,8,9 * * 1-5'
    - cron: '7 10 * * 1-5'
    # Post-market catch: 16:07-17:07 IST = UTC 10:37-11:37.
    - cron: '37 10 * * 1-5'
    - cron: '7,37 11 * * 1-5'
    # Late-night catch: 22:00 IST weekdays.
    - cron: '30 16 * * 1-5'
    # Weekend coverage: every ~2h, 08:47-20:47 IST.
    - cron: '17 3,5,7,9,11,13,15 * * 6,0'
  workflow_dispatch:
    inputs:
      enrich_limit:
        description: 'Max filings to enrich'
        type: string
        default: '50'

env:
  NODE_VERSION: '22'

permissions:
  contents: write

# Shared write-lock across all ingest workflows: they all mutate the single
# release-asset DB, so writers MUST serialize for correctness. This lock is now
# short (no build/deploy inside it). Phase 3 (D1) removes the need for it.
concurrency:
  group: tipsheet-db-write
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Restore latest DB
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Install pipeline deps
        run: cd pipeline && npm ci

      - name: Fetch fundamentals
        run: cd pipeline && node --env-file=../.env.ci run.mjs fetch-fundamentals
        env:
          KITE_SCREENER_URL: ${{ secrets.KITE_SCREENER_URL }}
        continue-on-error: true

      - name: Poll filings
        run: cd pipeline && node --env-file=../.env.ci run.mjs poll
        env:
          TIJORI_FEED_URL: ${{ secrets.TIJORI_FEED_URL }}

      # Filings primary model is MiMo v2.5 (sharper prose + best number fidelity
      # in the bakeoff, cheapest). Enricher auto-detects the non-Gemini base URL
      # → OpenAI-compatible path. DeepSeek stays as the resilience fallback.
      # Other enrichers (briefings/circulars/etc.) remain on Gemini for now.
      - name: Enrich filings
        run: cd pipeline && node --env-file=../.env.ci run.mjs enrich "$LIMIT"
        env:
          LLM_API_KEY: ${{ secrets.MIMO_API_KEY }}
          LLM_BASE_URL: https://api.xiaomimimo.com/v1
          LLM_MODEL: mimo-v2.5
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LIMIT: ${{ inputs.enrich_limit || '50' }}

      - name: Show stats
        run: cd pipeline && node --env-file=../.env.ci run.mjs stats

      - name: Sync content tables to D1
        if: always()
        timeout-minutes: 3
        run: bash .github/scripts/sync-d1.sh
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: '4645967f-e1aa-4291-b023-5509fcddb758'
          D1_SYNC_ARGS: '--tables source_health'
        continue-on-error: true

      - name: Publish latest DB
        if: always()
        run: bash .github/scripts/publish-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          context: Fast News ingest
