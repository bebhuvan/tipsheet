name: Backfill FAQs (one-off)

# Manual-only. Regenerates ONLY the faqs column on existing articles (4–6 sharper
# Q&As via the enrichment model), then rebuilds + deploys. Never touches the
# headline / dek / body / slug, so published URLs and analysis are unchanged.
# Operates on the canonical CI database published as the filings-db-latest release asset.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max articles to process (0 = all that still have < 4 FAQs)'
        type: string
        default: '0'

env:
  NODE_VERSION: '22'

permissions:
  contents: write

concurrency:
  group: tipsheet-db-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore latest DB
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Install pipeline deps
        run: cd pipeline && npm ci

      - name: Backfill FAQs (FAQs-only; leaves headline/body/slug untouched)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LIMIT: ${{ inputs.limit }}
        run: cd pipeline && node --env-file=../.env.ci backfill_faqs.mjs --limit "$LIMIT" --concurrency 5

      # Persist the backfilled DB so future pipeline runs build from it.
      - name: Publish latest DB
        if: always()
        run: bash .github/scripts/publish-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      # Headlines are unchanged, so the OG cache fully hits (no re-render).
      - name: Restore + persist OG image cache
        uses: actions/cache@v4
        with:
          path: site/.og-cache
          key: og-cache-${{ github.run_id }}
          restore-keys: |
            og-cache-

      - name: Install site deps
        run: cd site && npm ci

      - name: Build site
        run: cd site && npm run build

      - name: Check internal links
        run: cd site && npm run check:links

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: deploy
