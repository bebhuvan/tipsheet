name: Macro + Radar

# Ingest-only: macro calendar + data-release notes + radar, publish the DB.
# publish-site.yml deploys automatically on success.

on:
  schedule:
    # Early reference refresh after SDK, before market open.
    - cron: '2 2 * * 1-5'
    # Late-night macro release and radar refresh.
    - cron: '42 16 * * 1-5'
    # Weekend refresh.
    - cron: '42 6 * * 0'
  workflow_dispatch: {}

env:
  NODE_VERSION: '22'

permissions:
  contents: write

concurrency:
  group: tipsheet-db-write
  cancel-in-progress: false

jobs:
  macro:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Restore latest DB
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Install pipeline deps
        run: cd pipeline && npm ci

      - name: Poll macro calendar
        run: cd pipeline && node --env-file=../.env.ci run.mjs poll-macro-calendar
        env:
          INDIA_DATAHUB_API_KEY: ${{ secrets.INDIA_DATAHUB_API_KEY }}
          INDIA_DATAHUB_BASE_URL: ${{ secrets.INDIA_DATAHUB_BASE_URL }}
        continue-on-error: true

      - name: Macro data-release notes
        run: cd pipeline && node --env-file=../.env.ci macro_release.mjs run 15
        env:
          INDIA_DATAHUB_API_KEY: ${{ secrets.INDIA_DATAHUB_API_KEY }}
          INDIA_DATAHUB_BASE_URL: ${{ secrets.INDIA_DATAHUB_BASE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        continue-on-error: true

      - name: Generate radar
        run: cd pipeline && node --env-file=../.env.ci run.mjs generate-radar
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        continue-on-error: true

      - name: Show stats
        run: cd pipeline && node --env-file=../.env.ci run.mjs stats

      - name: Sync content tables to D1
        if: always()
        run: bash .github/scripts/sync-d1.sh
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: '4645967f-e1aa-4291-b023-5509fcddb758'
        continue-on-error: true

      - name: Publish latest DB
        if: always()
        run: bash .github/scripts/publish-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          context: Macro + Radar ingest
