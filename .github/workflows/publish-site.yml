name: Publish Site

# Single source of truth for building + deploying the site. Ingestion workflows
# no longer build/deploy themselves — they write the DB and finish fast. This
# workflow runs automatically after any of them succeeds, and can be triggered
# manually. Decoupling build/deploy from ingestion means:
#   - the slow build no longer sits inside the DB write-lock (ingestion stays fast)
#   - bursts of ingest completions collapse into ONE deploy (cancel-in-progress)
#   - every deploy builds from the freshly-published canonical DB (no stale artifact)
on:
  workflow_run:
    workflows:
      - Fast News
      - Market Briefings
      - Concalls
      - Macro + Radar
      - RBI + Regulatory
      - Tijori SDK
      - Backfill FAQs
    types: [completed]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you deploying manually?'
        type: string
        default: 'manual deploy'

env:
  NODE_VERSION: '22'
  WRANGLER_VERSION: '4'

permissions:
  contents: write

jobs:
  build-deploy:
    # Manual runs always proceed; auto runs only when the upstream ingest succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # A burst of ingest completions should produce ONE deploy of the latest state,
    # not N redundant full-site rebuilds. Latest deploy wins, but the follow-up
    # notification-state job must not be cancelled after it has sent messages.
    concurrency:
      group: tipsheet-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Restore latest canonical DB
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Restore + persist OG image cache
        uses: actions/cache@v4
        with:
          path: site/.og-cache
          key: og-cache-${{ github.run_id }}
          restore-keys: |
            og-cache-

      - name: Install site deps
        run: cd site && npm ci

      - name: Check content contracts
        run: cd site && npm run check:content

      - name: Build site
        run: cd site && npm run build

      - name: Check internal links
        run: cd site && npm run check:links

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          workingDirectory: site
          command: deploy

      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          context: Publish Site (build/deploy)

  notify-persist:
    needs: build-deploy
    if: ${{ needs.build-deploy.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: tipsheet-db-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Restore latest canonical DB
        run: bash .github/scripts/restore-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Install pipeline deps (for notifier)
        run: cd pipeline && npm ci

      # Idempotent (notified_at): only newly published notes/briefings are sent,
      # so running after every deploy is safe and means ALL sources get notified
      # (previously only Fast News + Briefings notified).
      - name: Notify Telegram
        run: cd pipeline && node --env-file=../.env.ci notify_telegram.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SCOPE: all
          SITE_URL: https://tipsheet.markets

      - name: Publish notification state
        if: always()
        run: bash .github/scripts/publish-db.sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          context: Publish Site (notify/persist)
