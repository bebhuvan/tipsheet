name = "tipsheet-watchdog"
main = "src/index.js"
compatibility_date = "2026-05-01"

# Cron Trigger: every 15 minutes. The Worker itself gates on the active IST
# window and the staleness threshold, so off-hours ticks are cheap no-ops.
[triggers]
crons = ["*/15 * * * *"]

[vars]
GITHUB_REPOSITORY = "bebhuvan/tipsheet"          # owner/repo
HEALTH_URL = "https://tipsheet.markets/api/health.json"
WORKFLOW_FILE = "pipeline.yml"                    # Fast News (chains a deploy on success)
GITHUB_REF = "main"
STALE_MINUTES = "75"
SOURCE_STALE_HOURS = "30"   # per-source staleness window for Telegram alerts

# Secrets (set via `wrangler secret put <NAME>`):
#   GITHUB_TOKEN  — fine-grained PAT, scoped to this repo, Actions: Read and write.
#   TG_BOT_TOKEN  — (optional) Telegram bot token, for per-source degraded alerts.
#   TG_CHAT_ID    — (optional) Telegram chat/channel id for those alerts.
# Per-source alerting is a no-op if TG_BOT_TOKEN / TG_CHAT_ID are unset.
#
# Optional KV for dispatch cooldown (prevents repeated dispatches while a
# catch-up run is in flight). Create with:
#   wrangler kv namespace create WATCHDOG
# then uncomment and paste the id:
# [[kv_namespaces]]
# binding = "WATCHDOG"
# id = "<kv-namespace-id>"
